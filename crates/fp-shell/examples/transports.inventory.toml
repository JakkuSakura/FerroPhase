[groups]
all = ["localhost", "ssh-web", "docker-app", "k8s-api", "windows-admin"]

[hosts.localhost]
transport = "local"

[hosts.ssh-web]
transport = "ssh"
address = "10.0.0.11"
user = "deploy"
port = 22

[hosts.docker-app]
transport = "docker"
container = "app"
user = "root"

[hosts.k8s-api]
transport = "kubectl"
pod = "api-7f9f6"
namespace = "prod"
container = "api"
context = "prod-cluster"

[hosts.windows-admin]
transport = "winrm"
address = "10.0.0.21"
user = "Administrator"
password = "change-me"
port = 5985
scheme = "http"
